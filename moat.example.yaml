# moat.yaml — The Moat configuration
# Copy this to moat.yaml and customize, or run `moat init`

# Bridges — trusted sources that cross freely into the castle
# Everything NOT on a bridge gets scanned at the wall
bridges:
  - "owner:*"            # direct chat with agent owner
  - "workspace:*"        # agent's own files
  - "internal:*"         # internal tool calls

# Scanner configuration
scanner:
  # Layer 1: Pattern Engine (regex + heuristics, <1ms)
  layer1:
    enabled: true
    strip_hidden_text: true        # remove CSS-hidden text
    strip_zero_width: true         # remove zero-width Unicode characters
    strip_base64_instructions: true # detect base64-encoded prompts
    max_content_length: 100000     # truncate beyond this (chars)

  # Layer 2: LLM Classifier (cheap model, ~100ms)
  layer2:
    enabled: true
    provider: openai               # openai | anthropic | local
    model: gpt-4.1-nano            # cheapest/fastest
    api_key_env: OPENAI_API_KEY    # env var containing the API key
    threshold: 0.85                # confidence score to trigger block
    timeout_ms: 3000               # give up after this long
    max_scan_length: 2048          # chars to send to classifier

  # What to do when content is flagged
  on_suspect: block                # block | quarantine | sanitize | pass

# Audit logging
logging:
  enabled: true
  format: json                     # json | text
  path: ./moat.log

# Server settings (/scan API)
server:
  host: 127.0.0.1
  port: 9999

# Transparent HTTP proxy settings
proxy:
  bind: 127.0.0.1
  port: 9998
  connect_timeout_seconds: 10
  read_timeout_seconds: 30
  write_timeout_seconds: 30
  max_scan_body_bytes: 1048576
  log_https_connect: true
